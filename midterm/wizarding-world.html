<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wizarding World | Developer Portfolio 🪄</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    :root { 
      --magic-deep: #0f0c29;
      --magic-gradient: linear-gradient(to right, #0f0c29, #302b63, #24243e);
      --wizard-purple: #63437c; 
      --gold: #f1c40f; 
      --glass: rgba(255, 255, 255, 0.03);
      --text-main: #ffffff;
      --card-bg: rgba(255, 255, 255, 0.03);
      --nav-bg: rgba(15, 12, 41, 0.8);
    }

    body.light-mode {
      --magic-gradient: linear-gradient(to right, #e0eafc, #cfdef3);
      --text-main: #24243e;
      --glass: rgba(0, 0, 0, 0.05);
      --card-bg: rgba(255, 255, 255, 0.7);
      --nav-bg: rgba(255, 255, 255, 0.9);
      --wizard-purple: #4b3061;
    }

    body { 
      background: var(--magic-gradient);
      color: var(--text-main);
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      transition: background 0.4s ease, color 0.4s ease;
      overflow-x: hidden;
    }

    .bg-animation {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      background: radial-gradient(circle at 50% 50%, rgba(100, 50, 150, 0.1) 0%, transparent 80%);
    }

    .navbar { 
      background: var(--nav-bg) !important;
      backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(241, 196, 15, 0.3);
      padding: 1rem 0;
    }

    .navbar-brand {
      letter-spacing: 2px;
      font-size: 1.2rem;
      text-transform: uppercase;
      color: var(--text-main) !important;
    }

    #themeToggle {
      background: var(--glass);
      border: 1px solid var(--gold);
      color: var(--gold);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card { 
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      height: 100%;
    }

    body.light-mode .card {
      border: 1px solid rgba(0, 0, 0, 0.05);
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    .card:hover { 
      transform: translateY(-12px);
      border-color: var(--gold);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
    }

    .char-name {
      color: var(--text-main) !important;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-top: 10px;
    }

    .char-img { 
      height: 220px; 
      object-fit: cover; 
      border-radius: 20px 20px 0 0;
      width: 100%;
      filter: sepia(10%) brightness(95%);
    }

    .btn-magic {
      background: transparent;
      color: var(--gold);
      border: 1px solid var(--gold);
      border-radius: 30px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-magic:hover {
      background: var(--gold);
      color: #000;
      box-shadow: 0 0 15px var(--gold);
    }

    .form-control {
      border-radius: 30px;
      padding: 0.6rem 1.2rem;
      background: var(--glass) !important;
      color: var(--text-main) !important;
      border: 1px solid rgba(255,255,255,0.1);
    }

    body.light-mode .form-control {
        border: 1px solid rgba(0,0,0,0.1);
    }

    @media (min-width: 768px) {
      .sticky-sidebar { position: sticky; top: 100px; }
    }
  </style>
</head>
<body>

  <div class="bg-animation"></div>

  <nav class="navbar navbar-dark sticky-top shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
      <span class="navbar-brand fw-bold">🪄 Wizarding <span style="color: var(--gold);">World</span></span>
      <button id="themeToggle" onclick="toggleMode()">
        <i id="themeIcon" class="fas fa-moon"></i>
      </button>
    </div>
  </nav>

  <div class="container my-5">
    <div class="row">
      <aside class="col-12 col-md-4 col-lg-3 mb-4">
        <div class="card p-4 sticky-sidebar">
          <h6 class="text-uppercase fw-bold mb-4" style="color: var(--gold); font-size: 0.8rem;">Explore the Magic</h6>
          <input type="text" id="mainSearch" class="form-control mb-4 shadow-none" placeholder="Search name...">
          
          <div class="d-grid gap-2">
            <button class="btn btn-sm btn-magic text-start ps-3" onclick="filterByHouse('all')">All Classes</button>
            <button class="btn btn-sm btn-magic text-start ps-3" onclick="filterByHouse('gryffindor')">Gryffindor</button>
            <button class="btn btn-sm btn-magic text-start ps-3" onclick="filterByHouse('slytherin')">Slytherin</button>
            <button class="btn btn-sm btn-magic text-start ps-3" onclick="filterByHouse('ravenclaw')">Ravenclaw</button>
            <button class="btn btn-sm btn-magic text-start ps-3" onclick="filterByHouse('hufflepuff')">Hufflepuff</button>
          </div>
        </div>
      </aside>

      <main class="col-12 col-md-8 col-lg-9">
        <div id="character-grid" class="row row-cols-2 row-cols-lg-3 g-4">
          <div class="col-12 text-center py-5">
            <div class="spinner-grow text-warning" role="status"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div class="modal fade" id="hpModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg" style="background: var(--magic-deep); border-radius: 25px; overflow: hidden; color: white;">
        <div class="modal-body p-0">
          <div id="mBody"></div>
          <div class="p-4 text-center">
             <button type="button" class="btn btn-magic px-5" data-bs-dismiss="modal">Close Profile</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let allChars = [];
    let modalObj;

    function toPascal(str) {
      if (!str) return 'N/A';
      return str.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
    }

    function toggleMode() {
      const body = document.body;
      const icon = document.getElementById('themeIcon');
      body.classList.toggle('light-mode');
      
      if(body.classList.contains('light-mode')) {
        icon.classList.replace('fa-moon', 'fa-sun');
      } else {
        icon.classList.replace('fa-sun', 'fa-moon');
      }
    }

    window.onload = async () => {
      modalObj = new bootstrap.Modal(document.getElementById('hpModal'));
      try {
        const res = await fetch('https://hp-api.onrender.com/api/characters');
        const data = await res.json();
        allChars = data.filter(c => c.image); 
        renderChars(allChars.slice(0, 18));
      } catch (e) {
        console.error("The spell failed:", e);
      }
    };

    function renderChars(list) {
      const grid = document.getElementById('character-grid');
      grid.innerHTML = '';
      list.forEach(c => {
        grid.innerHTML += `
          <div class="col">
            <div class="card" onclick="viewChar('${c.id}')">
              <img src="${c.image}" class="char-img">
              <div class="card-body text-center p-3">
                <p class="char-name mb-0">${c.name}</p>
                <span class="small opacity-50" style="font-size: 0.65rem; color: var(--text-main);">${toPascal(c.house)}</span>
              </div>
            </div>
          </div>`;
      });
    }

    function viewChar(id) {
      const c = allChars.find(char => char.id === id);
      document.getElementById('mBody').innerHTML = `
        <div class="position-relative">
          <img src="${c.image}" class="img-fluid w-100" style="height: 400px; object-fit: cover;">
          <div class="position-absolute bottom-0 start-0 w-100 p-4" style="background: linear-gradient(transparent, #000);">
            <h3 class="fw-bold text-white mb-0">${c.name}</h3>
            <p class="text-warning small mb-0">${toPascal(c.house)} House</p>
          </div>
        </div>
        <div class="px-4 pt-3 text-start">
          <div class="row small opacity-75">
            <div class="col-6 mb-2"><strong>Actor:</strong><br>${c.actor}</div>
            <div class="col-6 mb-2"><strong>Patronus:</strong><br>${toPascal(c.patronus)}</div>
            <div class="col-6"><strong>Wand:</strong><br>${toPascal(c.wand.wood)} Wood</div>
            <div class="col-6"><strong>Status:</strong><br>${c.wizard ? 'Wizard' : 'Muggle'}</div>
          </div>
        </div>`;
      modalObj.show();
    }

    function filterByHouse(house) {
      const filtered = house === 'all' ? allChars : allChars.filter(c => c.house.toLowerCase() === house);
      renderChars(filtered.slice(0, 18));
    }

    document.getElementById('mainSearch').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = allChars.filter(c => c.name.toLowerCase().includes(term));
      renderChars(filtered.slice(0, 18));
    });
  </script>
</body>
</html>
